<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>快捷键速查 · WezTerm · tmux · Neovim</title>
<style>
  :root {
    --bg: #1a1b26; --bg-alt: #16161e; --bg-soft: #1f2335; --bg-hover: #24283b;
    --text: #c0caf5; --text-dim: #9aa5ce; --text-mute: #565f89;
    --border: #2a2e44; --border-soft: #21262f;
    --accent: #7aa2f7; --accent-2: #bb9af7;
    --green: #9ece6a; --cyan: #7dcfff; --orange: #ff9e64; --red: #f7768e; --yellow: #e0af68;
    --kbd-bg: #2f334d; --kbd-border: #3b4156; --kbd-text: #c0caf5;
    --spc-bg: linear-gradient(135deg,#7aa2f7,#bb9af7);
    --warn-bg: rgba(255,158,100,.10); --warn-border: #ff9e64;
  }
  [data-theme="light"] {
    --bg: #f5f6fb; --bg-alt: #fff; --bg-soft: #eef0f7; --bg-hover: #e6e9f5;
    --text: #2b3145; --text-dim: #51587a; --text-mute: #8a90a8;
    --border: #d9deea; --border-soft: #e7eaf2;
    --accent: #2d5cf6; --accent-2: #8b5cf6;
    --green: #2e8b57; --cyan: #0a8fc4; --orange: #d2691e; --red: #d83958; --yellow: #b07d18;
    --kbd-bg: #fff; --kbd-border: #c3c9da; --kbd-text: #2b3145;
    --spc-bg: linear-gradient(135deg,#2d5cf6,#8b5cf6);
    --warn-bg: rgba(210,105,30,.08); --warn-border: #d2691e;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}

  header.topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:color-mix(in srgb,var(--bg) 82%,transparent);border-bottom:1px solid var(--border)}
  .topbar-inner{max-width:1280px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--spc-bg);display:grid;place-items:center;font-size:20px;color:#fff;flex:none}
  .brand h1{font-size:17px;margin:0;font-weight:700}
  .brand .sub{font-size:12px;color:var(--text-mute)}
  .tabs{display:flex;gap:4px;background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;padding:3px}
  .tab{border:none;background:transparent;color:var(--text-dim);padding:6px 14px;border-radius:7px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s}
  .tab.active{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .spacer{flex:1 1 auto}
  .search{position:relative;flex:1 1 280px;max-width:380px;min-width:160px}
  .search input{width:100%;background:var(--bg-soft);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 56px 9px 32px;font-size:14px;outline:none}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
  .search .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-mute);font-size:13px}
  .icon-btn{background:var(--bg-soft);border:1px solid var(--border);color:var(--text-dim);border-radius:10px;width:38px;height:38px;display:grid;place-items:center;cursor:pointer;font-size:16px;flex:none}
  .icon-btn:hover{color:var(--accent);border-color:var(--accent)}

  .layout{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:220px minmax(0,1fr);gap:28px;padding:24px 22px 80px}
  @media(max-width:900px){.layout{grid-template-columns:1fr;padding:18px 16px 80px}nav.sidebar{position:static!important;max-height:none!important}}
  nav.sidebar{position:sticky;top:78px;align-self:start;max-height:calc(100vh - 96px);overflow-y:auto;padding-right:6px}
  nav.sidebar::-webkit-scrollbar{width:6px}nav.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--text-dim);font-size:13.5px;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
  .nav-item:hover{background:var(--bg-soft);color:var(--text)}
  .nav-item.active{color:var(--accent);border-left-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
  .nav-item .ico{width:18px;text-align:center;flex:none}
  .nav-item .label{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav-item .count{font-size:11px;color:var(--text-mute);background:var(--bg-soft);border-radius:20px;padding:1px 7px;flex:none}
  .nav-item.hidden{display:none}

  main{min-width:0}
  .intro{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,var(--bg-soft)),color-mix(in srgb,var(--accent-2) 12%,var(--bg-soft)));border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px;font-size:13.5px;color:var(--text-dim)}
  .intro b{color:var(--text)}
  .intro code{background:var(--bg-soft);padding:1px 6px;border-radius:5px;font-family:"SF Mono",Menlo,monospace;color:var(--text)}
  .warn{background:var(--warn-bg);border:1px solid var(--warn-border);border-left-width:3px;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px;color:var(--text-dim)}
  .warn b{color:var(--orange)}
  .warn code{background:var(--bg-soft);padding:1px 5px;border-radius:4px;font-family:"SF Mono",Menlo,monospace;color:var(--text)}

  section.cat{margin-bottom:32px;scroll-margin-top:84px}
  section.cat.hidden{display:none}
  .cat-head{display:flex;align-items:center;gap:10px;margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border-soft)}
  .cat-head .emoji{font-size:18px}
  .cat-head h2{font-size:16px;margin:0;font-weight:700}
  .cat-head .cnt{color:var(--text-mute);font-size:12px;font-weight:400}

  table{width:100%;border-collapse:collapse}
  tbody tr{border-bottom:1px solid var(--border-soft)}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--bg-soft)}
  tbody tr.hidden{display:none}
  td{padding:9px 12px;vertical-align:middle}
  td.keys{white-space:normal;width:32%}
  td.src{width:64px;text-align:center}
  td.desc{color:var(--text);font-weight:500;width:30%;font-family:"SF Mono",Menlo,monospace;font-size:13px}
  td.note{color:var(--text-dim);font-size:13.5px}

  kbd{display:inline-block;background:var(--kbd-bg);color:var(--kbd-text);border:1px solid var(--kbd-border);border-bottom-width:2px;border-radius:6px;padding:1px 7px;margin:0 2px 2px 0;font-family:"SF Mono","JetBrains Mono",Menlo,monospace;font-size:12px;line-height:1.7;min-width:18px;text-align:center}
  kbd.mod{border-color:var(--accent);color:var(--accent)}
  kbd.spc{background:var(--spc-bg);color:#fff;border-color:transparent;font-weight:700}
  .plus{color:var(--text-mute);margin:0 1px;font-size:11px}
  .src-badge{display:inline-block;font-size:10.5px;font-family:"SF Mono",Menlo,monospace;border:1px solid var(--border);border-radius:5px;padding:1px 6px;line-height:1.5}
  .src-badge.custom{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 40%,transparent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
  .src-badge.def{color:var(--text-mute)}

  .empty{text-align:center;color:var(--text-mute);padding:50px 20px;display:none}
  footer{max-width:1280px;margin:0 auto;padding:26px 22px 40px;color:var(--text-mute);font-size:12.5px;border-top:1px solid var(--border-soft)}
  footer code{background:var(--bg-soft);padding:2px 6px;border-radius:5px;font-family:"SF Mono",Menlo,monospace;color:var(--text-dim)}
  /* nvim: mode badges + legend + kbd-hint */
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px}
  .legend span{display:inline-flex;align-items:center;gap:6px;color:var(--text-mute);font-size:12.5px}
  .badge{display:inline-block;font-size:10.5px;font-family:"SF Mono",Menlo,monospace;background:var(--bg-soft);color:var(--text-dim);border:1px solid var(--border);border-radius:5px;padding:1px 5px;line-height:1.5;white-space:nowrap}
  .badge.n{color:var(--accent)} .badge.x{color:var(--accent-2)} .badge.i{color:var(--green)} .badge.v{color:var(--accent-2)} .badge.o{color:var(--cyan)} .badge.c{color:var(--orange)} .badge.t{color:var(--green)} .badge.s{color:var(--yellow)}
  td.mode{width:64px;text-align:center}
  .kbd-hint{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--text-mute);font-size:11px;pointer-events:none}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo">⌨</div>
      <div>
        <h1>终端快捷键速查</h1>
        <div class="sub" id="sub">WezTerm · macOS</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tool="wezterm">WezTerm</button>
      <button class="tab" data-tool="tmux">tmux</button>
      <button class="tab" data-tool="nvim">Neovim</button>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <span class="icon">🔍</span>
      <input id="search" type="text" placeholder="搜索快捷键 / 描述 / 说明 …" autocomplete="off" />
      <span class="kbd-hint">按 / 聚焦</span>
    </div>
    <button class="icon-btn" id="theme" title="切换主题">🌙</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="nav"></nav>
  <main>
    <div id="intro"></div>
    <div id="sections"></div>
    <div class="empty" id="empty">没有匹配的快捷键 😢</div>
  </main>
</div>

<footer>
  数据来源：WezTerm（<code>wezterm show-keys</code> + <code>wezterm.lua</code>）、tmux（<code>tmux -f /dev/null list-keys -T prefix</code>，已回归默认）、Neovim（LazyVim <code>~/.config/nvim</code> 已启用插件 keymap）。
  所有快捷键均通过读取本地配置文件生成，详见 <code>AGENTS.md</code>。
</footer>

<script>
const INTRO = {
  wezterm: `<div class="intro">
    基于本地 <b>wezterm.lua</b> 配置（自定义键）+ WezTerm 默认键（macOS）。
    <code>Cmd</code>=⌘ <code>Shift</code>=⇧ <code>Ctrl</code>=⌃ <code>Alt</code>=⌥。
    自定义键多在 <code>Cmd+Shift</code> 组合上，与 vim 的 hjkl 移动方式一致。
    <code>Cmd+Shift+D</code> 会智能判断：在 tmux 里发 <code>Ctrl-b d</code> detach（tmux 现为默认前缀 C-b，可正常 detach），否则关闭当前 pane（带确认）。
  </div>`,
  tmux: `<div class="intro">
    <b>tmux.conf 已回归默认</b>（仅保留 <code>set -g mouse on</code> 与 <code>default-terminal</code>，自定义键已全部注释）。
    <b>前缀 = <code>C-b</code></b>（tmux 原生默认）。用法：按下 <code>C-b</code> 松开，再按功能键；<code>C-b C-b</code> 发送字面 <code>Ctrl-b</code> 给程序。
  </div>`,
  nvim: `<div class="intro">
    基于 <b>LazyVim</b> 默认配置 + 本地自定义（透明 tokyonight、自动换行等）。
    <code>&lt;leader&gt;</code> = <b>空格键 (Space)</b>，<code>&lt;localleader&gt;</code> = <b>&#92;</b>。
    大部分快捷键来源于 LazyVim，使用 <b>snacks.nvim</b> 作为 picker / explorer，<b>blink.cmp</b> 补全，<b>claudecode.nvim</b> 提供 AI。
    <div class="legend">
      <span><b class="badge n">n</b> 普通</span>
      <span><b class="badge x">x</b> 可视</span>
      <span><b class="badge v">v</b> 可视行</span>
      <span><b class="badge i">i</b> 插入</span>
      <span><b class="badge o">o</b> 待决</span>
      <span><b class="badge c">c</b> 命令行</span>
      <span><b class="badge t">t</b> 终端</span>
      <span><b class="badge s">s</b> 选择</span>
    </div>
  </div>`
};

const DATA = {

    { id:"wt-copy", icon:"📋", title:"复制 / 粘贴 / 搜索", items:[

// ---------- render helpers ----------
const labelMap = {Cmd:"⌘",Shift:"⇧",Ctrl:"⌃",Alt:"⌥",Option:"⌥",Enter:"↵",Up:"↑",Down:"↓",Left:"←",Right:"→",Space:"␣",Tab:"⇥",Esc:"⎋",Backspace:"⌫"};
const mods = new Set(["Cmd","Shift","Ctrl","Alt","Option"]);

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function attrEsc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

function tokenClass(tok){
  if(tok==="C-a"||tok==="C-b") return "spc";   // tmux prefix
  if(mods.has(tok)) return "mod";
  return "";
}
function renderKey(s){
  return s.split(/\s+/).map(function(chord){
    return chord.split("+").map(function(tok){
      const label = labelMap[tok] || tok;
      return '<kbd class="'+tokenClass(tok)+'">'+escapeHtml(label)+'</kbd>';
    }).join('<span class="plus">+</span>');
  }).join(' ');
}
function srcBadge(src){
  return src==="custom"
    ? '<span class="src-badge custom">自定义</span>'
    : '<span class="src-badge def">默认</span>';
}
// ---------- nvim render helpers ----------
const labelMapNvim = {
  leader: "SPC", localleader: "\\", tab: "Tab", space: "Space",
  cr: "⏎", esc: "Esc", bs: "⌫", enter: "⏎",
  up: "↑", down: "↓", left: "←", right: "→",
};
const specialClass = new Set(["leader","localleader"]);

function tokenize(key) {
  const tokens = [];
  let i = 0, buf = "";
  const flush = () => { if (buf) { tokens.push({ t: buf, sp: false }); buf = ""; } };
  while (i < key.length) {
    const ch = key[i];
    if (ch === "<") {
      // try to match a <...> special token
      const end = key.indexOf(">", i + 1);
      if (end !== -1 && /^[A-Za-z0-9 _\-\/]+$/.test(key.slice(i + 1, end))) {
        flush();
        tokens.push({ t: key.slice(i + 1, end), sp: true });
        i = end + 1;
        continue;
      }
    }
    buf += ch;
    i++;
  }
  flush();
  return tokens;
}

function renderKeyNvim(keyStr) {
  // split on " / " as alternatives, render each token run, join with " / "
  const parts = keyStr.split(" / ");
  return parts.map(p => tokenize(p).map(tok => {
    const label = labelMapNvim[tok.t.toLowerCase()] || tok.t;
    const cls = tok.sp && specialClass.has(tok.t.toLowerCase()) ? ' class="spc"' :
                tok.sp ? ' class="mod"' : "";
    const title = tok.sp && labelMapNvim[tok.t.toLowerCase()]
      ? ` title="${tok.t}"` : "";
    return `<kbd${cls}${title}>${escapeHtml(label)}</kbd>`;
  }).join("")).join('<span style="color:var(--text-mute);margin:0 4px;">/</span>');
}

function modeBadge(m) {
  return m.split(/\s+/).map(x => `<b class="badge ${x}">${x}</b>`).join(" ");
}


// ---------- state ----------
let activeTool = "wezterm";
const navEl = document.getElementById("nav");
const sectionsEl = document.getElementById("sections");
const introEl = document.getElementById("intro");
const input = document.getElementById("search");
const emptyEl = document.getElementById("empty");

function render(){
  const cats = DATA[activeTool];
  introEl.innerHTML = INTRO[activeTool];
  navEl.innerHTML = "";
  sectionsEl.innerHTML = "";
  cats.forEach(function(cat){
    const navItem = document.createElement("a");
    navItem.className = "nav-item";
    navItem.href = "#"+cat.id;
    navItem.dataset.cat = cat.id;
    navItem.innerHTML = '<span class="ico">'+cat.icon+'</span>'+
      '<span class="label">'+escapeHtml(cat.title)+'</span>'+
      '<span class="count">'+cat.items.length+'</span>';
    navEl.appendChild(navItem);

    const sec = document.createElement("section");
    sec.className = "cat";
    sec.id = cat.id;
    let rows = "";
    cat.items.forEach(function(it){
      var isNvim = !!it.mode;
      var keysHtml = isNvim ? renderKeyNvim(it.key) : renderKey(it.key);
      var badgeHtml = isNvim ? '<td class="mode">'+modeBadge(it.mode)+'</td>' : '<td class="src">'+srcBadge(it.src)+'</td>';
      rows += '<tr data-q="'+attrEsc((it.key+" "+it.desc+" "+it.note).toLowerCase())+'" data-cat="'+cat.id+'">'+
        '<td class="keys">'+keysHtml+'</td>'+
        badgeHtml+
        '<td class="desc">'+escapeHtml(it.desc)+'</td>'+
        '<td class="note">'+escapeHtml(it.note)+'</td>'+
        '</tr>';
    });
    sec.innerHTML = '<div class="cat-head"><span class="emoji">'+cat.icon+'</span>'+
      '<h2>'+escapeHtml(cat.title)+'</h2><span class="cnt">'+cat.items.length+' 项</span></div>'+
      '<table><tbody>'+rows+'</tbody></table>';
    sectionsEl.appendChild(sec);
  });
  document.getElementById("sub").textContent = activeTool === "wezterm" ? "WezTerm · macOS" : activeTool === "tmux" ? "tmux · 前缀 C-b（默认）" : "Neovim · LazyVim";
  document.querySelectorAll("section.cat").forEach(function(s){ obs.observe(s); });
  filter();
}

function filter(){
  const q = input.value.trim().toLowerCase();
  let visTotal = 0;
  document.querySelectorAll("section.cat").forEach(function(sec){
    let vis = 0;
    sec.querySelectorAll("tbody tr").forEach(function(tr){
      const m = !q || tr.dataset.q.indexOf(q) !== -1;
      tr.classList.toggle("hidden", !m);
      if(m) vis++;
    });
    visTotal += vis;
    sec.classList.toggle("hidden", vis===0);
    const nav = document.querySelector('.nav-item[data-cat="'+sec.id+'"]');
    if(nav){
      nav.classList.toggle("hidden", vis===0);
      const cnt = nav.querySelector(".count");
      const tot = sec.querySelectorAll("tbody tr").length;
      if(cnt) cnt.textContent = q ? vis+"/"+tot : tot;
    }
  });
  emptyEl.style.display = visTotal===0 ? "block" : "none";
}

document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click", function(){
    document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
    t.classList.add("active");
    activeTool = t.dataset.tool;
    input.value = "";
    render();
  });
});

const obs = new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting){
      document.querySelectorAll(".nav-item").forEach(function(n){ n.classList.toggle("active", n.dataset.cat===e.target.id); });
    }
  });
}, { rootMargin:"-90px 0px -70% 0px", threshold:0 });

input.addEventListener("input", filter);
document.addEventListener("keydown", function(e){
  if(e.key==="/" && document.activeElement !== input){ e.preventDefault(); input.focus(); }
  else if(e.key==="Escape" && document.activeElement === input){ input.value=""; filter(); input.blur(); }
});

const root = document.documentElement;
const themeBtn = document.getElementById("theme");
function setTheme(t){ root.setAttribute("data-theme",t); themeBtn.textContent = t==="dark"?"🌙":"☀️"; try{localStorage.setItem("tterm-theme",t);}catch(e){} }
themeBtn.addEventListener("click", function(){ setTheme(root.getAttribute("data-theme")==="dark"?"light":"dark"); });
try{ const s=localStorage.getItem("tterm-theme"); if(s) setTheme(s); }catch(e){}

render();
